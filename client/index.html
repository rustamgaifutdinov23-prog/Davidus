<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAVIDUS — Asian War Strategy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a12;
      color: #e8e0d0;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    #game-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block;
      z-index: 1;
    }

    /* ---- LOBBY ---- */
    #lobby {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a08 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .lobby-box {
      background: rgba(20, 15, 10, 0.95);
      border: 1px solid #6a4a2a;
      border-radius: 8px;
      padding: 2.5rem;
      width: 420px;
      box-shadow: 0 0 60px rgba(180, 100, 30, 0.2);
    }

    .game-title {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.3em;
      color: #e8c060;
      text-align: center;
      text-shadow: 0 0 30px rgba(232, 192, 96, 0.5);
      margin-bottom: 0.2rem;
    }

    .subtitle {
      text-align: center;
      color: #a08060;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a08060;
      margin-bottom: 0.4rem;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #1a1208;
      border: 1px solid #4a3a2a;
      border-radius: 4px;
      color: #e8e0d0;
      font-size: 0.95rem;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: #e8c060;
    }

    .btn-row {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }

    button {
      padding: 0.6rem 1.2rem;
      background: #4a2a0a;
      border: 1px solid #8a5a2a;
      border-radius: 4px;
      color: #e8c060;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      flex: 1;
      transition: background 0.15s;
    }
    button:hover { background: #6a3a12; }

    #join-section {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.5rem;
    }
    #join-section input {
      flex: 1;
      padding: 0.6rem;
      background: #1a1208;
      border: 1px solid #4a3a2a;
      border-radius: 4px;
      color: #e8e0d0;
      font-size: 1rem;
      outline: none;
      text-align: center;
      letter-spacing: 0.3em;
    }
    #join-section button { flex: 0 0 auto; }

    #room-info {
      margin-top: 1.2rem;
      padding: 1rem;
      background: #0e0a04;
      border: 1px solid #4a3a1a;
      border-radius: 4px;
      text-align: center;
    }
    #room-info strong {
      font-size: 1.8rem;
      color: #e8c060;
      letter-spacing: 0.4em;
    }
    .waiting {
      font-size: 0.8rem;
      color: #6a5a4a;
      margin-top: 0.5rem;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .error {
      margin-top: 0.8rem;
      padding: 0.5rem;
      background: #2a0a0a;
      border: 1px solid #aa3333;
      border-radius: 4px;
      color: #ff6666;
      font-size: 0.85rem;
      text-align: center;
    }

    /* ---- HUD ---- */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      background: linear-gradient(180deg, rgba(5,3,1,0.9) 0%, transparent 100%);
      z-index: 50;
      pointer-events: none;
      gap: 1.5rem;
    }

    #hud-money {
      font-size: 1.1rem;
      font-weight: bold;
      color: #e8c060;
    }
    #hud-income {
      font-size: 0.85rem;
      color: #88c060;
    }

    #hud-selected {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 50;
    }
    .unit-info {
      background: rgba(10, 8, 4, 0.85);
      border: 1px solid #4a3a2a;
      border-radius: 4px;
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      color: #e8e0d0;
      text-transform: capitalize;
    }

    /* ---- BUILD PANEL ---- */
    #build-panel {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      background: rgba(8, 5, 2, 0.92);
      border: 1px solid #5a3a1a;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 0.8rem 1.2rem;
      min-width: 320px;
      display: none;
      z-index: 50;
    }

    .bldg-name {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: #a08060;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .build-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 0.8rem;
      background: #2a1a0a;
      border: 1px solid #5a3a1a;
      border-radius: 4px;
      color: #e8e0d0;
      cursor: pointer;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      min-width: 80px;
      font-size: 0.75rem;
      gap: 0.2rem;
      text-transform: uppercase;
      flex: none;
    }
    .build-btn:hover { background: #3a2212; border-color: #e8c060; }
    .unit-name { font-weight: bold; color: #e8c060; }
    .unit-cost { color: #88c060; }
    .unit-time { color: #8898c0; }

    /* ---- GAME OVER ---- */
    #game-over {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      flex-direction: column;
      gap: 1rem;
    }
    #game-over .winner-name {
      font-size: 2.5rem;
      color: #e8c060;
      text-align: center;
    }
    #game-over button {
      padding: 0.8rem 2rem;
      font-size: 1rem;
    }

    /* Controls hint */
    #controls-hint {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.7rem;
      color: #5a4a3a;
      line-height: 1.8;
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- Lobby -->
  <div id="lobby"></div>

  <!-- HUD -->
  <div id="hud">
    <span id="hud-money">💰 200</span>
    <span id="hud-income">+0/tick</span>
  </div>

  <!-- Selected units info -->
  <div id="hud-selected"></div>

  <!-- Build panel -->
  <div id="build-panel"></div>

  <!-- Game over -->
  <div id="game-over">
    <div class="winner-name"></div>
    <button onclick="location.reload()">PLAY AGAIN</button>
  </div>

  <!-- Controls hint -->
  <div id="controls-hint">
    WASD / Arrows — pan camera<br>
    Scroll — zoom<br>
    Left click — select unit<br>
    Right click — move / attack<br>
    Drag — box select
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
