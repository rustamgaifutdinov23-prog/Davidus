<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAVIDUS — Asian War Strategy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e8e0d0;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #game-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block;
      z-index: 1;
    }

    /* ============================================================ LOBBY */
    #lobby {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a08 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .lobby-box {
      background: rgba(12,10,6,0.97);
      border: 1px solid #4a3a1a;
      border-radius: 10px;
      padding: 2.5rem;
      width: 440px;
      box-shadow: 0 0 80px rgba(180,100,30,0.25), inset 0 1px 0 rgba(255,200,80,0.06);
    }

    .game-title {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 0.35em;
      color: #e8c060;
      text-align: center;
      text-shadow: 0 0 40px rgba(232,192,96,0.6);
      margin-bottom: 0.2rem;
    }

    .subtitle {
      text-align: center;
      color: #7a6040;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 0.9rem; }
    .form-group label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a7050;
      margin-bottom: 0.35rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.55rem 0.8rem;
      background: #13100a;
      border: 1px solid #3a2a1a;
      border-radius: 5px;
      color: #e8e0d0;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: #e8c060; }

    .btn-row { display: flex; gap: 0.7rem; margin-top: 1.2rem; }

    button {
      padding: 0.6rem 1.2rem;
      background: #3a1e06;
      border: 1px solid #6a4018;
      border-radius: 5px;
      color: #e8c060;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      flex: 1;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: #5a2e0e; border-color: #e8c060; }

    #join-section { margin-top: 0.8rem; display: flex; gap: 0.5rem; }
    #join-section input {
      flex: 1;
      padding: 0.6rem;
      background: #13100a;
      border: 1px solid #3a2a1a;
      border-radius: 5px;
      color: #e8e0d0;
      font-size: 1.1rem;
      outline: none;
      text-align: center;
      letter-spacing: 0.4em;
    }
    #join-section button { flex: 0 0 auto; }

    #room-info {
      margin-top: 1.2rem;
      padding: 1rem;
      background: #0a0803;
      border: 1px solid #3a2a10;
      border-radius: 5px;
      text-align: center;
    }
    #room-info strong { font-size: 2rem; color: #e8c060; letter-spacing: 0.5em; }
    .waiting {
      font-size: 0.75rem; color: #5a4a30; margin-top: 0.5rem;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .error {
      margin-top: 0.8rem; padding: 0.5rem;
      background: #200808; border: 1px solid #882222;
      border-radius: 4px; color: #ff6666; font-size: 0.82rem; text-align: center;
    }

    /* ============================================================ HUD TOP */
    #hud-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: linear-gradient(180deg, rgba(4,3,1,0.96) 0%, rgba(4,3,1,0.72) 100%);
      border-bottom: 1px solid rgba(100,70,20,0.35);
      display: flex;
      align-items: stretch;
      z-index: 50;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }

    .hud-seg {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 18px;
      border-right: 1px solid rgba(100,70,20,0.25);
    }
    .hud-seg:last-child { border-right: none; }
    .hud-seg.grow { flex: 1; justify-content: center; }
    .hud-seg.push { margin-left: auto; }

    .hud-lbl {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6a5030;
      line-height: 1;
    }
    .hud-val {
      font-size: 1.05rem;
      font-weight: 700;
      color: #e8c060;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    #hud-income { font-size: 0.8rem; font-weight: 600; color: #68c050; margin-left: -2px; }
    #hud-timer {
      font-size: 1.15rem;
      font-weight: 700;
      color: #d8d0c0;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
    }
    #hud-timer.urgent { color: #ff4030; animation: pulse 0.7s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

    .score-block { display: flex; flex-direction: column; align-items: center; padding: 0 10px; }
    .score-block .sn { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em; color: #6a5030; }
    .score-block .sv { font-size: 0.95rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .score-sep { color: #3a2a10; font-size: 1.1rem; }

    /* ============================================================ HUD BOTTOM */
    #hud-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 94px;
      background: linear-gradient(0deg, rgba(4,3,1,0.97) 0%, rgba(4,3,1,0.82) 100%);
      border-top: 1px solid rgba(100,70,20,0.35);
      display: flex;
      align-items: stretch;
      z-index: 50;
      backdrop-filter: blur(6px);
    }

    /* Left: selected units */
    #hud-selected {
      min-width: 200px;
      max-width: 280px;
      padding: 7px 10px;
      border-right: 1px solid rgba(100,70,20,0.25);
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow-y: auto;
    }
    .sel-hdr { font-size: 0.56rem; text-transform: uppercase; letter-spacing: 0.1em; color: #4a3820; margin-bottom: 1px; }
    .unit-card {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 6px;
      background: rgba(255,200,80,0.03);
      border: 1px solid rgba(100,70,20,0.2);
      border-radius: 3px;
    }
    .uc-icon { font-size: 0.85rem; }
    .uc-name { font-size: 0.7rem; color: #c8a870; font-weight: 600; flex: 1; text-transform: capitalize; }
    .uc-hp { font-size: 0.65rem; font-variant-numeric: tabular-nums; }
    .uc-hp.ok { color: #58c040; }
    .uc-hp.mid { color: #e8b030; }
    .uc-hp.low { color: #f84030; }

    /* Center: build buttons */
    #hud-build {
      flex: 1;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-right: 1px solid rgba(100,70,20,0.25);
    }

    .build-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 6px 10px;
      background: rgba(20,14,5,0.92);
      border: 1px solid rgba(90,60,15,0.45);
      border-radius: 6px;
      color: #e8e0d0;
      cursor: pointer;
      min-width: 72px;
      transition: all 0.14s;
      pointer-events: all;
    }
    .build-btn:hover {
      background: rgba(55,32,8,0.95);
      border-color: #e8c060;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(232,192,96,0.12);
    }
    .build-btn.active {
      border-color: #50d870;
      background: rgba(10,35,10,0.92);
      box-shadow: 0 0 14px rgba(80,216,112,0.18);
    }
    .build-btn.cant-afford { opacity: 0.35; cursor: not-allowed; transform: none !important; }
    .bb-icon { font-size: 1.35rem; }
    .bb-name { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.07em; color: #b89050; font-weight: 600; }
    .bb-cost { font-size: 0.62rem; color: #58c040; }

    /* Right: production */
    #hud-production {
      min-width: 190px;
      max-width: 260px;
      padding: 7px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow-y: auto;
      pointer-events: all;
    }
    .prod-hdr { font-size: 0.56rem; text-transform: uppercase; letter-spacing: 0.1em; color: #4a3820; margin-bottom: 1px; }
    .prod-bldg-name { font-size: 0.68rem; color: #c8a060; font-weight: 600; text-transform: capitalize; margin-bottom: 3px; }
    .prod-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 7px;
      background: rgba(20,14,5,0.85);
      border: 1px solid rgba(80,50,10,0.35);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.12s;
      pointer-events: all;
    }
    .prod-btn:hover { background: rgba(55,32,8,0.9); border-color: #e8c060; }
    .pb-icon { font-size: 0.85rem; }
    .pb-name { flex: 1; font-size: 0.68rem; color: #b89868; font-weight: 600; text-transform: capitalize; }
    .pb-cost { font-size: 0.62rem; color: #58c040; }
    .pb-time { font-size: 0.58rem; color: #5878b8; }

    /* ============================================================ PLACEMENT */
    #place-hint {
      position: fixed;
      top: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(6,24,6,0.93);
      border: 1px solid #50d870;
      border-radius: 6px;
      padding: 6px 20px;
      font-size: 0.8rem;
      color: #70f090;
      letter-spacing: 0.1em;
      z-index: 60;
      display: none;
      pointer-events: none;
    }

    /* ============================================================ GAME OVER */
    #game-over {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      flex-direction: column;
      gap: 1.2rem;
    }
    .go-title { font-size: 0.9rem; letter-spacing: 0.3em; color: #6a5030; text-transform: uppercase; }
    .winner-name { font-size: 2.8rem; font-weight: 900; color: #e8c060; text-shadow: 0 0 40px rgba(232,192,96,0.5); }
    #go-scores { display: flex; gap: 1.5rem; }
    .go-entry {
      text-align: center; padding: 10px 22px;
      background: rgba(12,9,3,0.92);
      border: 1px solid #3a2a10; border-radius: 6px;
    }
    .go-entry .gen { font-size: 0.7rem; color: #7a6040; text-transform: uppercase; letter-spacing: 0.1em; }
    .go-entry .gev { font-size: 1.7rem; font-weight: 700; color: #e8c060; }
    #go-reason { font-size: 0.72rem; color: #4a4030; letter-spacing: 0.1em; }
    #game-over button { padding: 0.75rem 2.5rem; font-size: 0.88rem; letter-spacing: 0.15em; }

    /* ============================================================ MISC */
    #controls-hint {
      position: fixed;
      bottom: 100px; right: 12px;
      font-size: 0.62rem; color: #302820; line-height: 1.9;
      pointer-events: none; z-index: 50;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- Lobby -->
  <div id="lobby"></div>

  <!-- HUD TOP -->
  <div id="hud-top" style="display:none">
    <div class="hud-seg">
      <span style="font-size:1rem">💰</span>
      <div>
        <div class="hud-lbl">Treasury</div>
        <div class="hud-val" id="hud-money">200</div>
      </div>
      <span id="hud-income" style="margin-left:4px">+0/tick</span>
    </div>

    <div class="hud-seg grow">
      <span style="font-size:1rem">⏱</span>
      <span id="hud-timer">∞</span>
    </div>

    <div class="hud-seg" id="hud-scores" style="gap:0; pointer-events:none">
      <!-- populated dynamically -->
    </div>
  </div>

  <!-- HUD BOTTOM -->
  <div id="hud-bottom" style="display:none">
    <div id="hud-selected">
      <div class="sel-hdr">Selected</div>
    </div>

    <div id="hud-build">
      <button class="build-btn" data-type="admin_building">
        <span class="bb-icon">🏢</span>
        <span class="bb-name">Admin</span>
        <span class="bb-cost">$80</span>
      </button>
      <button class="build-btn" data-type="barracks">
        <span class="bb-icon">⚔️</span>
        <span class="bb-name">Barracks</span>
        <span class="bb-cost">$100</span>
      </button>
      <button class="build-btn" data-type="factory">
        <span class="bb-icon">🏭</span>
        <span class="bb-name">Factory</span>
        <span class="bb-cost">$200</span>
      </button>
      <button class="build-btn" data-type="artillery_base">
        <span class="bb-icon">🎯</span>
        <span class="bb-name">Artillery</span>
        <span class="bb-cost">$250</span>
      </button>
    </div>

    <div id="hud-production">
      <div class="prod-hdr">Production</div>
      <div id="prod-content" style="font-size:0.65rem;color:#302818;margin-top:4px">Select a building</div>
    </div>
  </div>

  <!-- Placement hint -->
  <div id="place-hint">🏗 Click to place &nbsp;|&nbsp; ESC to cancel</div>

  <!-- Game over -->
  <div id="game-over">
    <div class="go-title">Game Over</div>
    <div class="winner-name" id="go-winner-name">Victory!</div>
    <div id="go-scores"></div>
    <div id="go-reason"></div>
    <button onclick="location.reload()">▶ PLAY AGAIN</button>
  </div>

  <!-- Controls -->
  <div id="controls-hint">
    WASD / Arrows — pan<br>
    Scroll — zoom<br>
    Click — select unit<br>
    Right click — move/attack<br>
    Drag — box select
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
